<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRace</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07090f;
  --surface:#0e1118;
  --border:rgba(255,255,255,0.08);
  --text:#eef0f6;
  --muted:#6b7280;
  --accent:#e8d5a3;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

.app{
  max-width:700px;
  margin:auto;
  padding:1rem;
}

.logo{
  font-family:'Syne';
  font-size:32px;
  font-weight:800;
  color:var(--accent);
}

.btn{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

input{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
}

.screen{display:none;}
.screen.active{display:block;}

.article{
  background:var(--surface);
  padding:1rem;
  border-radius:12px;
  margin-top:1rem;
  max-height:60vh;
  overflow:auto;
}

a.wlink{
  color:#4ade80;
  cursor:pointer;
  text-decoration:none;
}
a.wlink:hover{text-decoration:underline;}

.topbar{
  margin-top:1rem;
  display:flex;
  justify-content:space-between;
  font-size:14px;
  color:var(--muted);
}

.target{
  color:#4ade80;
  font-weight:700;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo">WIKIRACE</div>

  <input id="name" placeholder="Ton prénom">
  <button class="btn btn-primary" onclick="createGame()">Créer une partie</button>

  <input id="join-code" placeholder="Code">
  <button class="btn" onclick="joinGame()">Rejoindre</button>
</div>

<!-- LOBBY -->
<div class="screen" id="lobby">
  <h2>Code : <span id="code"></span></h2>
  <div id="players"></div>
  <button class="btn btn-primary" onclick="startGame()">Lancer</button>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="topbar">
    <div>Clics : <span id="clicks">0</span></div>
    <div>Cible : <span id="target" class="target"></span></div>
  </div>

  <div class="article" id="article"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyDYrmf-ThU5x0SQBdEvUy5k83LyTXxhgFA",
  databaseURL:"https://undercover-game-b0d2a-default-rtdb.europe-west1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myCode=null, myName=null, myIndex=0;
let clicks=0;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genCode(){
  return "WR-"+Math.floor(1000+Math.random()*9000);
}

window.createGame = async () => {
  const name=document.getElementById('name').value.trim();
  if(!name) return;

  const code=genCode();

  await set(ref(db,'wr/'+code),{
    players:[{name}],
    phase:'lobby'
  });

  myCode=code;
  myName=name;

  listen();
};

window.joinGame = async () => {
  const code=document.getElementById('join-code').value.trim().toUpperCase();
  const name=document.getElementById('name').value.trim();
  if(!code||!name) return;

  const snap=await get(ref(db,'wr/'+code));
  if(!snap.exists()) return alert("Introuvable");

  const game=snap.val();
  game.players.push({name});

  await update(ref(db,'wr/'+code),{players:game.players});

  myCode=code;
  myName=name;
  myIndex=game.players.length-1;

  listen();
};

function listen(){
  onValue(ref(db,'wr/'+myCode),snap=>{
    const game=snap.val();

    if(game.phase==='lobby'){
      show('lobby');
      document.getElementById('code').textContent=myCode;
      document.getElementById('players').innerHTML=
        game.players.map(p=>p.name).join('<br>');
    }

    if(game.phase==='playing'){
      show('game');
      document.getElementById('target').textContent=game.target;
      loadArticle(game.current);
    }
  });
}

window.startGame = async () => {
  const start="France";
  const target="Tour Eiffel";

  await update(ref(db,'wr/'+myCode),{
    phase:'playing',
    current:start,
    target
  });
};

async function loadArticle(title){
  const url=`https://fr.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`;

  const res=await fetch(url);
  const html=await res.text();

  const container=document.getElementById('article');
  container.innerHTML=html;

  // nettoyer scripts
  container.querySelectorAll('script').forEach(s=>s.remove());

  // transformer liens
  container.querySelectorAll('a').forEach(a=>{
    const href=a.getAttribute('href');
    if(href && href.startsWith('./')){
      const title=decodeURIComponent(href.replace('./',''));
      a.classList.add('wlink');
      a.onclick=(e)=>{
        e.preventDefault();
        click(title);
      };
    }else{
      a.removeAttribute('href');
    }
  });
}

async function click(title){
  clicks++;
  document.getElementById('clicks').textContent=clicks;

  const snap=await get(ref(db,'wr/'+myCode));
  const game=snap.val();

  if(title.toLowerCase()===game.target.toLowerCase()){
    alert("🎉 Gagné !");
    return;
  }

  await update(ref(db,'wr/'+myCode),{
    current:title
  });
}

</script>
</body>
</html>
