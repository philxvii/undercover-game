<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRace</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07090f;
  --surface:#0e1118;
  --surface2:#141820;
  --border:rgba(255,255,255,0.08);
  --text:#eef0f6;
  --muted:#6b7280;
  --accent:#e8d5a3;
  --green:#4ade80;
  --r:16px;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

/* SCREEN */
.screen{
  display:none;
  max-width:900px;
  margin:auto;
  padding:1rem;
  animation:fade 0.4s ease;
}
.screen.active{display:block;}

@keyframes fade{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* TITLE */
.logo{
  font-family:'Syne';
  font-size:40px;
  font-weight:800;
  color:var(--accent);
}

/* CARD */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:1rem;
  margin-top:1rem;
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:var(--r);
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  margin-top:8px;
  transition:0.2s;
}
input:focus{
  border-color:var(--accent);
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:var(--r);
  margin-top:10px;
  cursor:pointer;
  background:var(--accent);
  color:#000;
  font-weight:700;
  transition:0.2s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.target{
  color:var(--green);
  font-weight:700;
}

/* ARTICLE */
#article{
  height:60vh;
  overflow:auto;
  background:var(--surface);
  padding:1rem;
  border-radius:var(--r);
  border:1px solid var(--border);
}

/* LINKS */
a{
  color:var(--accent);
  text-decoration:none;
  transition:0.15s;
}
a:hover{
  color:white;
}

/* SUGGESTIONS */
.suggestions{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
}
.suggestions div{
  padding:8px;
  cursor:pointer;
}
.suggestions div:hover{
  background:var(--surface2);
}

/* TOAST */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%) scale(0.9);
  background:var(--accent);
  color:#000;
  padding:10px 20px;
  border-radius:999px;
  opacity:0;
  transition:0.3s;
}
.toast.show{
  opacity:1;
  transform:translateX(-50%) scale(1);
}

/* BAN */
#ban{
  position:fixed;
  inset:0;
  background:#7f1d1d;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="ban"></div>
<div class="toast" id="toast"></div>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="logo">WikiRace</div>

  <div class="card">
    <input id="name" placeholder="Pseudo">

    <h3>Départ</h3>
    <input id="startInput" oninput="searchWiki(this,'startSug')">
    <div id="startSug" class="suggestions"></div>
    <button onclick="randomStart()">🎲 Aléatoire</button>

    <h3>Cible</h3>
    <input id="targetInput" oninput="searchWiki(this,'targetSug')">
    <div id="targetSug" class="suggestions"></div>
    <button onclick="randomTarget()">🎲 Aléatoire</button>

    <button onclick="start()">Lancer</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="top">
    🎯 <span id="target" class="target"></span>
    🖱 <span id="clicks">0</span>
  </div>
  <div id="article"></div>
</div>

<script>

const BANNED_MSG = "En vertu des très éclairées dispositions de l'article 16 de la loi SREN...";

let clicks=0, target="", path=[], cache={};

// NORMALIZE
function normalize(str){
  return str.toLowerCase()
    .replace(/[^a-z0-9]/g,'')
    .replace(/3/g,'e')
    .replace(/1/g,'i')
    .replace(/0/g,'o')
    .replace(/5/g,'s');
}

function isBanned(name){
  return normalize(name).includes("speedy");
}

function ban(){
  const b=document.getElementById("ban");
  b.style.display="flex";
  b.innerText=BANNED_MSG;
}

// RANDOM
const ARTICLES=["France","Chat","Internet","Lune","Paris","Google","Pizza"];

function randomStart(){startInput.value=ARTICLES[Math.floor(Math.random()*ARTICLES.length)];}
function randomTarget(){targetInput.value=ARTICLES[Math.floor(Math.random()*ARTICLES.length)];}

// SEARCH
async function searchWiki(input,id){
  const val=input.value;
  if(val.length<2) return;

  const res=await fetch(`https://fr.wikipedia.org/w/api.php?action=opensearch&search=${val}&limit=5&namespace=0&format=json&origin=*`);
  const data=await res.json();

  const box=document.getElementById(id);
  box.innerHTML="";
  data[1].forEach(t=>{
    const d=document.createElement("div");
    d.innerText=t;
    d.onclick=()=>{input.value=t;box.innerHTML="";}
    box.appendChild(d);
  });
}

// START
function start(){
  const name=nameInput.value.trim();
  if(isBanned(name)){ban();return;}

  let start=startInput.value;
  target=targetInput.value;

  if(!start||!target)return alert("Remplis");

  clicks=0;
  path=[start];

  clicksEl.innerText=0;
  targetEl.innerText=target;

  show("game");
  load(start);
}

// LOAD
async function load(title){
  if(cache[title]) return render(cache[title]);

  const res=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`);
  const html=await res.text();

  cache[title]=html;
  render(html);
}

// RENDER
function render(html){
  article.innerHTML=html;
  article.querySelectorAll("script").forEach(s=>s.remove());

  article.querySelectorAll("a").forEach(a=>{
    const href=a.getAttribute("href");
    if(href && href.startsWith("./")){
      const t=decodeURIComponent(href.replace("./",""));
      a.onclick=e=>{e.preventDefault();click(t);}
    } else a.removeAttribute("href");
  });
}

// CLICK
function click(title){
  clicks++;
  path.push(title);
  clicksEl.innerText=clicks;

  if(title.toLowerCase()===target.toLowerCase()){
    showToast("🏆 Victoire !");
    setTimeout(()=>{
      alert("Chemin :\n"+path.join(" → "));
      location.reload();
    },800);
    return;
  }

  load(title);
}

// TOAST
function showToast(msg){
  const t=toast;
  t.innerText=msg;
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}

// UI
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// SHORTCUTS
const nameInput=document.getElementById("name");
const startInput=document.getElementById("startInput");
const targetInput=document.getElementById("targetInput");
const article=document.getElementById("article");
const clicksEl=document.getElementById("clicks");
const targetEl=document.getElementById("target");
const toast=document.getElementById("toast");

</script>

</body>
</html>
