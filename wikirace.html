<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRace</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07090f;
  --surface:#0e1118;
  --surface2:#141820;
  --border:rgba(255,255,255,0.08);
  --text:#eef0f6;
  --muted:#6b7280;
  --accent:#facc15;
  --green:#4ade80;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

.app{max-width:900px;margin:auto;padding:1rem;}

.logo{
  font-family:'Syne';
  font-size:40px;
  font-weight:800;
  color:var(--accent);
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:1rem;
  margin-top:1rem;
  border:1px solid var(--border);
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  margin-top:8px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

.screen{display:none;}
.screen.active{display:block;}

.top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:10px;
}

.target{color:var(--green);font-weight:700;}

.article{
  height:60vh;
  overflow:auto;
  background:var(--surface);
  padding:1rem;
  border-radius:12px;
  border:1px solid var(--border);
}

a.wlink{
  color:var(--accent);
  cursor:pointer;
  text-decoration:none;
}
a.wlink:hover{
  color:white;
}

.win{
  text-align:center;
  margin-top:2rem;
}

.win h1{
  font-family:'Syne';
  font-size:32px;
}

/* Toast */
.toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:var(--accent);
  color:black;
  padding:10px 18px;
  border-radius:999px;
  font-weight:600;
  opacity:0;
  transition:0.3s;
}
.toast.show{opacity:1;}

/* Wikipedia clean */
.article *{color:var(--text)!important;background:transparent!important;}
.article a{color:var(--accent)!important;}
.article sup{display:none;}
.article div,.article span{background:transparent!important;}
.article .mw-editsection,
.article .reference,
.article .mw-references-wrap,
.article .sidebar,
.article .navbox,
.article .metadata{display:none!important;}

</style>
</head>

<body>
<div class="app">

<div class="screen active" id="home">
  <div class="logo">WIKIRACE</div>
  <div class="card">
    <input id="name" placeholder="Ton prénom">
    <button class="btn btn-primary" onclick="createGame()">Créer</button>
    <input id="join" placeholder="Code">
    <button class="btn" onclick="joinGame()">Rejoindre</button>
  </div>
</div>

<div class="screen" id="lobby">
  <div class="logo">Lobby</div>
  <div class="card">
    Code : <b id="code"></b>
    <div id="players"></div>
    <button class="btn btn-primary" onclick="startGame()">Lancer</button>
  </div>
</div>

<div class="screen" id="game">
  <div class="top">
    <div>🎯 <span id="target"></span></div>
    <div>⏱ <span id="timer">0</span>s</div>
    <div>🖱 <span id="clicks">0</span></div>
  </div>
  <div class="article" id="article"></div>
</div>

<div class="screen" id="win">
  <div class="win">
    <h1 id="winner"></h1>
    <p id="stats"></p>
    <p id="path"></p>
    <button class="btn btn-primary" onclick="location.reload()">Rejouer</button>
  </div>
</div>

<div class="toast" id="toast"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  databaseURL:"https://undercover-game-b0d2a-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

let myCode,myName,clicks=0,startTime,path=[];
let timerInterval;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

const ARTICLES=["France","Chat","Napoléon","Football","Internet","Musique","Lune","Soleil","Paris","Amazonie"];

function randomArticle(){
  return ARTICLES[Math.floor(Math.random()*ARTICLES.length)];
}

window.createGame=async()=>{
  const name=document.getElementById('name').value.trim();
  if(!name) return;
  const code="WR-"+Math.floor(Math.random()*9000+1000);

  await set(ref(db,'wr/'+code),{players:[{name}],phase:'lobby'});
  myCode=code; myName=name;
  listen();
};

window.joinGame=async()=>{
  const code=document.getElementById('join').value.trim().toUpperCase();
  const name=document.getElementById('name').value.trim();

  const snap=await get(ref(db,'wr/'+code));
  if(!snap.exists()) return alert("introuvable");

  const g=snap.val();
  g.players.push({name});
  await update(ref(db,'wr/'+code),{players:g.players});

  myCode=code; myName=name;
  listen();
};

function listen(){
  onValue(ref(db,'wr/'+myCode),snap=>{
    const g=snap.val();

    if(g.phase==='lobby'){
      show('lobby');
      code.textContent=myCode;
      players.innerHTML=g.players.map(p=>p.name).join('<br>');
    }

    if(g.phase==='playing'){
      show('game');
      target.textContent=g.target;
      loadArticle(g.current);
      if(!timerInterval) startTimer();
    }

    if(g.phase==='finished'){
      show('win');
      winner.textContent="🏆 "+g.winner+" a gagné !";
      stats.textContent=g.clicks+" clics";
      path.innerHTML="🧭 "+g.path.join(" → ");
      toast("🏆 "+g.winner+" a gagné !");
    }
  });
}

window.startGame=async()=>{
  let start=randomArticle();
  let target;
  do{target=randomArticle();}while(target===start);

  clicks=0;
  path=[];
  document.getElementById('clicks').textContent=0;

  await update(ref(db,'wr/'+myCode),{
    phase:'playing',
    current:start,
    target
  });
};

async function loadArticle(title){
  const res=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`);
  const html=await res.text();

  article.innerHTML=html;
  article.querySelectorAll('script').forEach(s=>s.remove());

  article.querySelectorAll('a').forEach(a=>{
    const href=a.getAttribute('href');
    if(href&&href.startsWith('./')){
      const t=decodeURIComponent(href.replace('./',''));
      a.onclick=(e)=>{e.preventDefault();click(t);}
    }else a.removeAttribute('href');
  });
}

async function click(title){
  const snap=await get(ref(db,'wr/'+myCode));
  const g=snap.val();
  if(g.phase==='finished') return;

  clicks++;
  path.push(title);
  document.getElementById('clicks').textContent=clicks;

  if(title.toLowerCase()===g.target.toLowerCase()){
    await update(ref(db,'wr/'+myCode),{
      phase:'finished',
      winner:myName,
      clicks,
      path
    });
    return;
  }

  await update(ref(db,'wr/'+myCode),{current:title});
}

function startTimer(){
  startTime=Date.now();
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    timer.textContent=Math.floor((Date.now()-startTime)/1000);
  },1000);
}
</script>
</body>
</html>
