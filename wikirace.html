<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRace PRO</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#07090f;
  color:white;
}

.screen{display:none;padding:20px;}
.screen.active{display:block;}

input,button{
  width:100%;
  padding:10px;
  margin:5px 0;
}

#article{
  height:60vh;
  overflow:auto;
  background:#111;
  padding:10px;
}

#ban{
  position:fixed;
  inset:0;
  background:red;
  color:white;
  display:none;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:30px;
  font-weight:bold;
}

a{color:#e8d5a3;cursor:pointer;}
.suggestions{background:#111;border:1px solid #333;}
.suggestions div{padding:5px;cursor:pointer;}
.suggestions div:hover{background:#222;}
</style>
</head>

<body>

<div id="ban"></div>

<!-- HOME -->
<div id="home" class="screen active">

<h1>WikiRace</h1>

<input id="name" placeholder="Pseudo">

<h3>Départ</h3>
<input id="startInput" oninput="searchWiki(this,'startSug')" placeholder="Nom ou lien">
<div id="startSug" class="suggestions"></div>
<button onclick="randomStart()">🎲 Aléatoire</button>

<h3>Cible</h3>
<input id="targetInput" oninput="searchWiki(this,'targetSug')" placeholder="Nom ou lien">
<div id="targetSug" class="suggestions"></div>
<button onclick="randomTarget()">🎲 Aléatoire</button>

<button onclick="start()">Lancer</button>

</div>

<!-- GAME -->
<div id="game" class="screen">
<div>🎯 <span id="target"></span> | 🖱 <span id="clicks">0</span></div>
<div id="article"></div>
</div>

<script>

// MESSAGE BAN
const BANNED_MSG = "En vertu des très éclairées dispositions de l'article 16 de la loi SREN, il est solennellement institué un dispositif de bannissement numérique destiné à frapper d'indignité digitale les personnes soupçonnées d'avoir commis, ou reconnues coupables d'avoir commis, certaines infractions en ligne ; étant en outre précisé, avec toute la rigueur que commande l'ordre public numérique, que toute référence, explicite ou implicite, à « speedy » sera tenue pour prohibée et pourra, le cas échéant, justifier l'édiction d'une mesure de bannissement à caractère permanent.";

// VARIABLES
let clicks=0;
let target="";
let path=[];
let cache={};

// NORMALISATION
function normalize(str){
  return str.toLowerCase()
    .replace(/[^a-z0-9]/g,'')
    .replace(/3/g,'e')
    .replace(/1/g,'i')
    .replace(/0/g,'o')
    .replace(/5/g,'s');
}

// BAN
function isBanned(name){
  return normalize(name).includes("speedy");
}

function ban(){
  const b=document.getElementById("ban");
  b.style.display="flex";
  b.innerText=BANNED_MSG;
}

// EXTRACTION TITLE
function extract(input){
  if(input.includes("wikipedia")){
    return decodeURIComponent(input.split("/").pop());
  }
  return input;
}

// RANDOM
const ARTICLES=["France","Chat","Internet","Lune","Paris","Google","Pizza","Amazonie"];

function randomStart(){
  document.getElementById("startInput").value=ARTICLES[Math.floor(Math.random()*ARTICLES.length)];
}

function randomTarget(){
  document.getElementById("targetInput").value=ARTICLES[Math.floor(Math.random()*ARTICLES.length)];
}

// SEARCH WIKI
async function searchWiki(input,container){
  const val=input.value;
  if(val.length<2) return;

  const res=await fetch(`https://fr.wikipedia.org/w/api.php?action=opensearch&search=${val}&limit=5&namespace=0&format=json&origin=*`);
  const data=await res.json();

  const box=document.getElementById(container);
  box.innerHTML="";

  data[1].forEach(title=>{
    const div=document.createElement("div");
    div.innerText=title;
    div.onclick=()=>{
      input.value=title;
      box.innerHTML="";
    };
    box.appendChild(div);
  });
}

// START
function start(){

  const name=document.getElementById("name").value.trim();

  if(isBanned(name)){
    ban();
    return;
  }

  let start=extract(document.getElementById("startInput").value);
  target=extract(document.getElementById("targetInput").value);

  if(!start || !target){
    alert("Remplis les champs");
    return;
  }

  while(start===target){
    target=randomArticle();
  }

  clicks=0;
  path=[start];

  document.getElementById("clicks").innerText=0;
  document.getElementById("target").innerText=target;

  show("game");
  load(start);
}

function randomArticle(){
  return ARTICLES[Math.floor(Math.random()*ARTICLES.length)];
}

// LOAD FAST
async function load(title){

  if(cache[title]){
    render(cache[title]);
    return;
  }

  const res=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`);
  const html=await res.text();

  cache[title]=html;
  render(html);
}

// RENDER
function render(html){

  const el=document.getElementById("article");
  el.innerHTML=html;

  el.querySelectorAll("script").forEach(s=>s.remove());

  el.querySelectorAll("a").forEach(a=>{
    const href=a.getAttribute("href");

    if(href && href.startsWith("./")){
      const t=decodeURIComponent(href.replace("./",""));

      a.onclick=e=>{
        e.preventDefault();
        click(t);
      };
    }else a.removeAttribute("href");
  });
}

// CLICK
function click(title){

  clicks++;
  path.push(title);

  document.getElementById("clicks").innerText=clicks;

  if(title.toLowerCase()===target.toLowerCase()){
    alert("🏆 Gagné en "+clicks+" clics\n\nChemin:\n"+path.join(" → "));
    location.reload();
    return;
  }

  load(title);
}

// UI
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
