<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WikiRace</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07090f;
  --surface:#0e1118;
  --surface2:#141820;
  --border:rgba(255,255,255,0.08);
  --text:#eef0f6;
  --muted:#6b7280;
  --accent:#e8d5a3;
  --green:#4ade80;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
}

.app{max-width:900px;margin:auto;padding:1rem;}

.logo{
  font-family:'Syne';
  font-size:40px;
  font-weight:800;
  color:var(--accent);
}

.card{
  background:var(--surface);
  border-radius:16px;
  padding:1rem;
  margin-top:1rem;
  border:1px solid var(--border);
}

input{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text);
  margin-top:8px;
}

.btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  cursor:pointer;
}

.btn-primary{
  background:var(--accent);
  color:#000;
  font-weight:700;
}

.screen{display:none;}
.screen.active{display:block;}

.top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:10px;
}

.target{color:var(--green);font-weight:700;}

.article{
  height:60vh;
  overflow:auto;
  background:var(--surface);
  padding:1rem;
  border-radius:12px;
  border:1px solid var(--border);
}

a.wlink{
  color:var(--accent);
  cursor:pointer;
  text-decoration:none;
}

.win{
  text-align:center;
  margin-top:2rem;
}

.win h1{
  font-family:'Syne';
  font-size:32px;
}

  /* ─── FIX WIKIPEDIA DARK MODE ─── */

.article * {
  color: var(--text) !important;
  background: transparent !important;
}

.article a {
  color: var(--accent) !important;
}

.article h1,
.article h2,
.article h3 {
  color: var(--text) !important;
}

.article p {
  color: var(--text) !important;
}

.article table {
  background: var(--surface2) !important;
  border: 1px solid var(--border) !important;
}

.article th,
.article td {
  border: 1px solid var(--border) !important;
  padding: 6px;
}

.article img {
  max-width: 100%;
  border-radius: 8px;
}

.article sup {
  display: none; /* enlève les [1] [2] */
}
  
</style>

  
</head>

<body>
<div class="app">

<!-- HOME -->
<div class="screen active" id="home">
  <div class="logo">WIKIRACE</div>
  <div class="card">
    <input id="name" placeholder="Ton prénom">
    <button class="btn btn-primary" onclick="createGame()">Créer</button>
    <input id="join" placeholder="Code">
    <button class="btn" onclick="joinGame()">Rejoindre</button>
  </div>
</div>

<!-- LOBBY -->
<div class="screen" id="lobby">
  <div class="logo">Lobby</div>
  <div class="card">
    Code : <b id="code"></b>
    <div id="players"></div>
    <button class="btn btn-primary" onclick="startGame()">Lancer</button>
  </div>
</div>

<!-- GAME -->
<div class="screen" id="game">
  <div class="top">
    <div>🎯 <span id="target"></span></div>
    <div>⏱ <span id="timer">0</span>s</div>
    <div>🖱 <span id="clicks">0</span></div>
  </div>

  <div class="article" id="article"></div>
</div>

<!-- WIN -->
<div class="screen" id="win">
  <div class="win">
    <h1 id="winner"></h1>
    <p id="stats"></p>
    <button class="btn btn-primary" onclick="location.reload()">Rejouer</button>
  </div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey:"AIzaSyDYrmf-ThU5x0SQBdEvUy5k83LyTXxhgFA",
  databaseURL:"https://undercover-game-b0d2a-default-rtdb.europe-west1.firebasedatabase.app"
});
const db = getDatabase(app);

let myCode, myName, clicks=0, startTime;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genCode(){return "WR-"+Math.floor(Math.random()*9000+1000);}

// ARTICLES RANDOM
const ARTICLES = [
"France","Chat","Napoléon","Football","Internet",
"Musique","Lune","Soleil","Paris","Amazonie",
"Einstein","Titanic","Google","YouTube","Pizza"
];

function randomArticle(){
  return ARTICLES[Math.floor(Math.random()*ARTICLES.length)];
}

window.createGame = async ()=>{
  const name=document.getElementById('name').value.trim();
  if(!name) return;

  const code=genCode();

  await set(ref(db,'wr/'+code),{
    players:[{name}],
    phase:'lobby'
  });

  myCode=code; myName=name;
  listen();
};

window.joinGame = async ()=>{
  const code=document.getElementById('join').value.trim().toUpperCase();
  const name=document.getElementById('name').value.trim();

  const snap=await get(ref(db,'wr/'+code));
  if(!snap.exists()) return alert("introuvable");

  const g=snap.val();
  g.players.push({name});

  await update(ref(db,'wr/'+code),{players:g.players});

  myCode=code; myName=name;
  listen();
};

function listen(){
  onValue(ref(db,'wr/'+myCode),snap=>{
    const g=snap.val();

    if(g.phase==='lobby'){
      show('lobby');
      document.getElementById('code').textContent=myCode;
      document.getElementById('players').innerHTML=g.players.map(p=>p.name).join('<br>');
    }

    if(g.phase==='playing'){
      show('game');
      document.getElementById('target').textContent=g.target;
      loadArticle(g.current);
      startTimer();
    }

    if(g.phase==='finished'){
      show('win');
      document.getElementById('winner').textContent="🏆 "+g.winner+" a gagné !";
      document.getElementById('stats').textContent=g.clicks+" clics";
    }
  });
}

window.startGame = async ()=>{
  await update(ref(db,'wr/'+myCode),{
    phase:'playing',
    current:randomArticle(),
    target:randomArticle()
  });
};

async function loadArticle(title){
  const res=await fetch(`https://fr.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`);
  const html=await res.text();

  const el=document.getElementById('article');
  el.innerHTML=html;

  el.querySelectorAll('script').forEach(s=>s.remove());

  el.querySelectorAll('a').forEach(a=>{
    const href=a.getAttribute('href');
    if(href && href.startsWith('./')){
      const t=decodeURIComponent(href.replace('./',''));
      a.classList.add('wlink');
      a.onclick=(e)=>{e.preventDefault();click(t);}
    } else a.removeAttribute('href');
  });
}

async function click(title){
  clicks++;
  document.getElementById('clicks').textContent=clicks;

  const snap=await get(ref(db,'wr/'+myCode));
  const g=snap.val();

  if(title.toLowerCase()===g.target.toLowerCase()){
    await update(ref(db,'wr/'+myCode),{
      phase:'finished',
      winner:myName,
      clicks
    });
    return;
  }

  await update(ref(db,'wr/'+myCode),{
    current:title
  });
}

function startTimer(){
  startTime=Date.now();
  setInterval(()=>{
    const s=Math.floor((Date.now()-startTime)/1000);
    document.getElementById('timer').textContent=s;
  },1000);
}
</script>
</body>
</html>
